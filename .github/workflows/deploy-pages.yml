name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 11
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
          
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      
      # Optional, but helps configure-pages find framework configs if you use them
      - uses: actions/configure-pages@v5
        with:
          static_site_generator: literal
          
      - uses: actions/upload-pages-artifact@v3
        with:
          # FIXED: This step runs from the root, so 'web/dist' is correct here 
          # because the working-directory default doesn't apply to 'uses'
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4